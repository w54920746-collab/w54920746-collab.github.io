<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineSpace — Магазин модов и карт</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #e2e8f0; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #fff; border-bottom: 2px solid #2d2d2d; padding-bottom: 15px; }
        
        /* Сетка для карточек */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        
        /* Карточка товара */
        .card { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 8px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 1.2rem; color: #fff; margin: 0 0 10px 0; font-weight: bold; }
        .card-desc { color: #cbd5e1; font-size: 0.9rem; line-height: 1.4; margin-bottom: 15px; flex-grow: 1; }
        .card-btn { background-color: #52b788; color: #fff; text-decoration: none; text-align: center; padding: 10px; border-radius: 5px; font-weight: bold; font-size: 0.9rem; }
        .card-btn:hover { background-color: #40916c; }
        .badge { background: #2d2d2d; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; color: #8b949e; align-self: flex-start; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Каталог модов и карт</h1>
    
    <div class="grid">
        
        <div class="card">
            <span class="badge">Карты</span>
            <div class="card-title">Один Блок (OneBlock)</div>
            <div class="card-desc">Классическое выживание на ломающемся блоке в пустоте. Пройдите все 10 фаз!</div>
            <a href="./oneblock.html" class="card-btn">Открыть и Скачать</a>
        </div>

        <div class="card" style="opacity: 0.5;">
            <span class="badge">Моды</span>
            <div class="card-title">Твой новый мод</div>
            <div class="card-desc">Описание твоего следующего крутого мода, который ты добавишь позже.</div>
            <a href="#" class="card-btn" style="background:#444; pointer-events:none;">Скоро</a>
        </div>

    </div>
</div>
</body>
</html>
